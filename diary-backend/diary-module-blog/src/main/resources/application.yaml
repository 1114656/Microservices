spring:
  application:
    name: diary-blog-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:diary-common.yaml?group=${NACOS_GROUP:DIARY_GROUP}
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DIARY_GROUP}
  main:
    allow-circular-references: true
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:diary_blog}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:diary_blog}
          password: ${MYSQL_PASSWORD:diary_blog_pwd}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:3}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
      datasource:
        flow:
          file:
            file: classpath:sentinel/flow-rules.json
            data-type: json
            rule-type: flow
        degrade:
          file:
            file: classpath:sentinel/degrade-rules.json
            data-type: json
            rule-type: degrade

feign:
  sentinel:
    enabled: ${FEIGN_SENTINEL_ENABLED:true}

server:
  port: ${SERVER_PORT:48084}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  type-aliases-package: ${diary.info.base-package}.module.*.dal.dataobject

diary:
  info:
    version: 1.0.0
    base-package: com.xiaoyang.diary
