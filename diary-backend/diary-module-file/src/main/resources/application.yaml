spring:
  application:
    name: diary-file-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:diary-common.yaml?group=${NACOS_GROUP:DIARY_GROUP}
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DIARY_GROUP}
  main:
    allow-circular-references: true
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:diary_file}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:diary_file}
          password: ${MYSQL_PASSWORD:diary_file_pwd}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:3}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV_ADDR:127.0.0.1:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:diary-file-producer}
  consumer:
    group: ${ROCKETMQ_CONSUMER_GROUP:diary-file-consumer}

server:
  port: ${SERVER_PORT:48082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  type-aliases-package: ${diary.info.base-package}.module.*.dal.dataobject

diary:
  info:
    version: 1.0.0
    base-package: com.xiaoyang.diary
  file:
    s3:
      endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
      access-key: ${MINIO_ACCESS_KEY:diary_minio}
      secret-key: ${MINIO_SECRET_KEY:diary_minio_pwd}
      bucket: ${MINIO_BUCKET:diary-file}
      region: us-east-1
      path-style-access-enabled: true
      preview-url-expire: 30m
  mq:
    idempotent-ttl: ${MQ_IDEMPOTENT_TTL:7d}
    outbox:
      enabled: ${MQ_OUTBOX_ENABLED:true}
      fixed-delay: ${MQ_OUTBOX_FIXED_DELAY:5000}
    consumer:
      file-uploaded:
        enabled: ${MQ_FILE_UPLOADED_CONSUMER_ENABLED:true}
