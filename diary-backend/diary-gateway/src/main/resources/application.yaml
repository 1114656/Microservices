spring:
  application:
    name: diary-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:diary-common.yaml?group=${NACOS_GROUP:DIARY_GROUP}
      - optional:nacos:${spring.application.name}.yaml?group=${NACOS_GROUP:DIARY_GROUP}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:3}
      password: ${REDIS_PASSWORD:}
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
      config:
        server-addr: ${spring.cloud.nacos.server-addr}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DIARY_GROUP}
        file-extension: yaml
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8080}
      scg:
        fallback:
          mode: response
          response-status: 429
          response-body: '{"code":429,"data":null,"msg":"gateway sentinel blocked"}'
    gateway:
      server:
        webflux:
          routes:
            - id: diary-system-service
              uri: lb://diary-system-service
              predicates:
                - Path=/admin-api/system/**
            - id: diary-file-service
              uri: lb://diary-file-service
              predicates:
                - Path=/admin-api/file/**
            - id: diary-diary-service
              uri: lb://diary-diary-service
              predicates:
                - Path=/admin-api/diary/**
            - id: diary-blog-service
              uri: lb://diary-blog-service
              predicates:
                - Path=/admin-api/blog/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

diary:
  jwt:
    issuer: ${JWT_ISSUER:diary}
    secret: ${JWT_SECRET:diary-local-development-secret-change-me}
